<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CakeMovie - Дивись найкраще</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">🍰 CakeMovie</div>
        <nav>
            <a href="#">Фільми</a>
            <a href="#">Серіали</a>
            <a href="#">Аніме</a>
        </nav>
        <button class="btn-login">Увійти</button>
    </header>
    <main class="container">
        <section class="movie-detail">
            <div class="poster-container">
                <img src="" alt="Форсаж" class="main-poster">
                <div class="rating-badge">9.2 / 10</div>
            </div>

            <div class="info-container">
                <h1></h1>
                <p class="tag-line"></p>

                <div class="meta-grid">
                    <div class="meta-item"></div>
                    <div class="meta-item"></div>
                    <div class="meta-item"></div>
                    <div class="meta-item"></div>
                    <div class="meta-item"></div>
                    <div class="meta-item"></div>
                </div>

                <div class="description">
                    <p></p>
                </div>

                <div class="actions">
                    <button class="btn-watch">Дивитися зараз</button>
                    <button class="btn-trailer">Трейлер</button>
                </div>
            </div>  

        </section>
    </main>
    <script src="script.js"></script>
</body>
